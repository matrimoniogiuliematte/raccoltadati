<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Il Nostro Matrimonio</title>

<style>

body{
margin:0;
font-family:Georgia,serif;
background:#F6F1EA;
color:#5A4738;
}

.hero{

height:100vh;

background-image:
linear-gradient(
rgba(0,0,0,0.35),
rgba(0,0,0,0.35)
),
url("images/cover.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;

align-items:center;

justify-content:center;

text-align:center;

color:white;

}

.hero h1{
font-size:64px;
}

.section{

max-width:900px;

margin:auto;

padding:80px 30px;

}

.card{

background:white;

padding:40px;

border-radius:20px;

margin-bottom:40px;

}

input,
select,
textarea{

width:100%;

padding:14px;

margin:10px 0;

border:1px solid #ddd;

border-radius:10px;

}

button{

background:#A86A4A;

color:white;

border:none;

padding:16px;

border-radius:10px;

cursor:pointer;

}

#countdown{
font-size:34px;
margin-top:20px;
letter-spacing:2px;
font-variant-numeric: tabular-nums;
font-family: Arial, sans-serif;
}

iframe{

width:100%;

height:420px;

border:none;

border-radius:18px;

}

</style>

</head>

<body>

<div class="hero">

<div>

<h1>Giulia & Matteo</h1>

<p>7 Novembre 2026</p>

<div id="countdown"></div>

</div>

</div>

<div class="section">

<div class="card">

<h2>Conferma Presenza</h2>

<input id="nome" placeholder="Nome e Cognome">

<!-- TITOLO -->
<p style="margin-top:15px; margin-bottom:5px; font-weight:bold;">
Parteciperai?
</p>

<!-- SCELTA PRESENZA (più pulita e “squadrata”) -->
<select id="presenza" style="
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:6px;
background:white;
">

<option value="Parteciperò">Parteciperò</option>
<option value="Non potrò esserci">Non potrò esserci</option>

</select>

<!-- NUMERO INVITATI con stile coerente -->
<input id="invitati" type="number" placeholder="Numero invitati" style="
width:100%;
padding:14px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
">

<textarea id="note"></textarea>

<button onclick="rsvp()">

Invia RSVP

</button>

</div>

<div class="card">

<h2>Lista Nozze</h2>

<input id="rnome" placeholder="Nome">

<input id="importo" type="number">

<textarea id="msg"></textarea>

<button onclick="regalo()">

Contribuisci

</button>

</div>

<div class="card">

<h2>Dove sarà</h2>

<iframe
src="https://maps.app.goo.gl/G4UAoPzFaiLWMjNw7">
</iframe>

</div>

</div>

<script>

const data=new Date(
"2026-11-07"
);

function timer(){

const now = new Date();
const diff = data - now;

// totale secondi
let totalSeconds = Math.floor(diff / 1000);

if (totalSeconds < 0) totalSeconds = 0;

// calcoli
const days = Math.floor(totalSeconds / 86400);
const hours = Math.floor((totalSeconds % 86400) / 3600);
const minutes = Math.floor((totalSeconds % 3600) / 60);
const seconds = totalSeconds % 60;

// padding con zero
const pad = (n) => String(n).padStart(2, "0");

// output formato GGG:HH:MM:SS
document.getElementById("countdown").innerHTML =
String(days).padStart(3, "0") + ":" +
pad(hours) + ":" +
pad(minutes) + ":" +
pad(seconds);

}

setInterval(
timer,
1000
);

async function send(data){

await fetch(

"https://script.google.com/macros/s/AKfycbwllHeYN9wpG5GL3bNy8P6PtFeeezXiIXiih-LSdD0Co7C3V8gOZBghCe1OXgItMiD2/exec",

{

method:"POST",

body:
JSON.stringify(data)

}

);

alert(
"Inviato ❤️"
);

}

function rsvp(){

send({

type:"rsvp",

nome:
nome.value,

invitati:
invitati.value,

presenza:
presenza.value,

note:
note.value

});

}

function regalo(){

send({

type:"regalo",

nome:
rnome.value,

importo:
importo.value,

messaggio:
msg.value

});

}

timer();

</script>

</body>
</html>
